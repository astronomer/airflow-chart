###################################################
## git-sync-relay Pre install/upgrade Init Hook  ##
###################################################
{{- if and .Values.gitSyncRelay.enabled (eq .Values.gitSyncRelay.repoShareMode "shared_volume") }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: git-repo-contents
  annotations:
    "helm.sh/hook": "pre-install"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    "helm.sh/hook-weight": "1"
  labels:
    component: git-sync-relay
    tier: airflow
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.gitSyncRelay.volumeSync.volumeSize }}
  storageClassName: {{ .Values.gitSyncRelay.volumeSync.storageClassName }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-git-sync-relay-init
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    "helm.sh/hook-weight": "3"
  labels:
    component: git-sync-relay
    tier: airflow
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-git-sync-relay-init
  labels:
    component: git-sync-relay
    tier: airflow
    release: {{ .Release.Name }}
    chart: "{{ .Release.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    "helm.sh/hook-weight": "5"
spec:
  template:
    metadata:
      labels:
        component: git-sync-relay
        tier: airflow
        release: {{ .Release.Name }}
    spec:
      {{- if or .Values.airflow.registry.secretName .Values.airflow.registry.connection }}
      imagePullSecrets:
        - name: {{ template "astro.registry_secret" . }}
      {{- end }}
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-git-sync-relay-init
      securityContext: {{- toYaml .Values.gitSyncRelay.securityContext | nindent 8 }}
      volumes:
        - name: git-sync-home
          emptyDir: {}
        - name: git-repo-contents
          persistentVolumeClaim:
            claimName: git-repo-contents
        - name: tmp
          emptyDir: {}
        {{- if .Values.gitSyncRelay.repo.sshPrivateKeySecretName }}
        - name: git-secret
          secret:
            secretName: {{ .Values.gitSyncRelay.repo.sshPrivateKeySecretName }}
        {{- end }}
        {{- if .Values.gitSyncRelay.repo.knownHosts }}
        - name: {{ .Release.Name }}-git-sync-config
          configMap:
            name: {{ .Release.Name }}-git-sync-config
        {{- end }}
      initContainers:
        - name: git-config-manager
          command: ["git", "config", "--global", "--add", "safe.directory", "/git"]
          image: "{{ .Values.airflow.images.gitSync.repository }}:{{ .Values.airflow.images.gitSync.tag }}"
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: git-sync-home
              mountPath: /home/git-sync
          resources: {{- toYaml .Values.gitSyncRelay.gitSync.resources | nindent 12 }}
      containers:
        - name: git-sync
          image: "{{ .Values.airflow.images.gitSync.repository }}:{{ .Values.airflow.images.gitSync.tag }}"
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: git-sync-home
              mountPath: /home/git-sync
            - name: tmp
              mountPath: /tmp
            {{- if .Values.gitSyncRelay.repo.sshPrivateKeySecretName }}
            - name: git-secret
              mountPath: /etc/git-secret/ssh
              readOnly: true
              subPath: gitSshKey
            {{- if .Values.gitSyncRelay.repo.knownHosts }}
            - name: {{ .Release.Name }}-git-sync-config
              mountPath: /etc/git-secret/known_hosts
              readOnly: true
              subPath: known_hosts
            {{- end }}
            {{- end }}
            - name: git-repo-contents
              mountPath: /git
          env:
            - name: GIT_SYNC_ONE_TIME
              value: "true"
            - name: GIT_SYNC_ROOT
              value: "/git"
            - name: GIT_SYNC_REPO
              value: "{{ .Values.gitSyncRelay.repo.url }}"
            - name: GIT_SYNC_BRANCH
              value: "{{ .Values.gitSyncRelay.repo.branch }}"
            - name: GIT_SYNC_DEPTH
              value: "{{ .Values.gitSyncRelay.repo.depth }}"
            {{- if .Values.gitSyncRelay.repo.sshPrivateKeySecretName }}
            - name: GIT_SYNC_SSH
              value: "true"
            - name: GIT_SSH_KEY_FILE
              value: "/etc/git-secret/ssh"
            {{- if .Values.gitSyncRelay.repo.knownHosts }}
            - name: GIT_KNOWN_HOSTS
              value: "true"
            - name: GIT_SSH_KNOWN_HOSTS_FILE
              value: "/etc/git-secret/known_hosts"
            {{- else }}
            - name: GIT_KNOWN_HOSTS
              value: "false"
            {{- end }}
            {{- end }}
          resources: {{- toYaml .Values.gitSyncRelay.gitSync.resources | nindent 12 }}
{{- end }}
